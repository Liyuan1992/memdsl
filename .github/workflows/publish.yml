name: Publish to PyPI

on:
  push:
    tags: ["v*"]

env:
  SOURCE_DATE_EPOCH: "1784077269"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install complete release environment
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev,mcp]"

      - name: Validate CFF schema in an isolated environment
        run: |
          python -m venv .cff-venv
          .cff-venv/bin/python -m pip install cffconvert==2.0.0
          .cff-venv/bin/cffconvert --validate

      - name: Verify tag and runtime versions agree
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          python scripts/release_checks.py version --expected "$TAG"

      - name: Full release tests and compile gates
        run: |
          python -m compileall -q src tests scripts
          python scripts/release_checks.py python39-ast
          python scripts/release_checks.py source-date-epoch
          python scripts/release_checks.py source-tree
          python scripts/release_checks.py build-toolchain
          python scripts/release_checks.py paper
          python -m pip check
          git diff --check
          python -m pytest -q
          python -m pytest -q tests/test_phase_minus_one_characterization.py tests/test_phase_two_catalog_budget.py tests/test_phase_three_indexed_query_trace.py tests/test_phase_four_use_dialect.py tests/test_phase_five_quarantine_enforcement.py tests/test_phase_six_explicit_edges.py

      - name: Build, Twine, member listing, and privacy scan
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          python -m build --no-isolation
          python -m twine check dist/*
          python scripts/release_checks.py artifacts --dist dist --expected "$TAG"

      - name: Outside-repo fresh wheel and real MCP stdio smoke
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          python scripts/release_fresh_install.py --wheel "dist/memdsl-${TAG}-py3-none-any.whl" --workspace examples/alex --expected "$TAG"

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
