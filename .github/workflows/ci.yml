name: ci

on:
  push:
  pull_request:

env:
  MEMDSL_RELEASE_VERSION: "0.9.0"
  SOURCE_DATE_EPOCH: "1784077269"

jobs:
  core:
    name: core / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install core and release tooling
        run: python -m pip install -U pip && python -m pip install -e ".[dev]"
      - name: Verify version contract
        run: python scripts/release_checks.py version --expected ${{ env.MEMDSL_RELEASE_VERSION }}
      - name: Compile and Python 3.9 syntax gate
        run: |
          python -m compileall -q src tests scripts
          python scripts/release_checks.py python39-ast
      - name: Verify MCP dependency marker
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.9'
        shell: python
        run: |
          from importlib.metadata import requires
          from packaging.markers import default_environment
          from packaging.requirements import Requirement

          requirement = next(
              Requirement(item)
              for item in (requires("memdsl") or [])
              if Requirement(item).name == "mcp"
          )
          environment = default_environment()
          environment["extra"] = "mcp"
          environment["python_version"] = "3.9"
          assert requirement.marker is not None
          assert not requirement.marker.evaluate(environment)
          environment["python_version"] = "3.10"
          assert requirement.marker.evaluate(environment)
      - name: Full core tests
        run: python -m pytest -q
      - name: CLI smoke
        run: |
          memdsl --version
          memdsl lint examples/mira
          memdsl catalog examples/alex --json
          memdsl trace examples/alex decision:aurora.pricing_free_tier --depth 2 --json
          memdsl eval compliance examples/compliance --cases examples/compliance/cases.jsonl

  mcp:
    name: mcp / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install MCP extra
        run: python -m pip install -U pip && python -m pip install -e ".[dev,mcp]"
      - name: Full tests with real stdio enabled
        run: python -m pytest -q
      - name: Phase stdio, scope-denial, v1/v2, and quarantine gates
        run: |
          python -m pytest -q tests/test_phase_three_indexed_query_trace.py tests/test_phase_four_use_dialect.py tests/test_phase_five_quarantine_enforcement.py tests/test_phase_six_explicit_edges.py
      - name: MCP inspect
        run: python -m memdsl.mcp_server --inspect -w examples/alex

  release-gates:
    name: release gates / Python 3.12
    needs: [core, mcp]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install complete release environment
        run: python -m pip install -U pip && python -m pip install -e ".[dev,mcp]"
      - name: Validate CFF schema in an isolated environment
        run: |
          CFF_VENV="${RUNNER_TEMP}/memdsl-cff-venv"
          python -m venv "$CFF_VENV"
          "$CFF_VENV/bin/python" -m pip install cffconvert==2.0.0
          "$CFF_VENV/bin/cffconvert" --validate
      - name: Version, compile, and full tests
        run: |
          python scripts/release_checks.py version --expected ${{ env.MEMDSL_RELEASE_VERSION }}
          python scripts/release_checks.py python39-ast
          python scripts/release_checks.py source-date-epoch
          python scripts/release_checks.py source-tree
          python scripts/release_checks.py build-toolchain
          python scripts/release_checks.py paper
          python -m compileall -q src tests scripts
          python -m pip check
          git diff --check
          python -m pytest -q
      - name: Synthetic scale and security stop gates
        run: |
          python -m pytest -q tests/test_phase_minus_one_characterization.py tests/test_phase_two_catalog_budget.py tests/test_phase_three_indexed_query_trace.py tests/test_phase_four_use_dialect.py tests/test_phase_five_quarantine_enforcement.py tests/test_phase_six_explicit_edges.py
      - name: Build, Twine, member listing, and privacy scan
        run: |
          python -m build --no-isolation
          python -m twine check dist/*
          python scripts/release_checks.py artifacts --dist dist --expected ${{ env.MEMDSL_RELEASE_VERSION }}
      - name: Outside-repo fresh wheel and real MCP stdio smoke
        run: |
          python scripts/release_fresh_install.py --wheel dist/memdsl-${{ env.MEMDSL_RELEASE_VERSION }}-py3-none-any.whl --workspace examples/alex --expected ${{ env.MEMDSL_RELEASE_VERSION }}
      - name: Upload verified release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: memdsl-${{ env.MEMDSL_RELEASE_VERSION }}
          path: dist/*
          if-no-files-found: error
