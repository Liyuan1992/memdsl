name: ci

on:
  push:
  pull_request:

jobs:
  core:
    name: core / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -U pip build && python -m pip install -e ".[dev]"
      - name: Compile
        run: python -m compileall -q src tests
      - name: Verify MCP dependency marker
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.9'
        shell: python
        run: |
          from importlib.metadata import requires
          from packaging.markers import default_environment
          from packaging.requirements import Requirement

          requirement = next(
              Requirement(item)
              for item in (requires("memdsl") or [])
              if Requirement(item).name == "mcp"
          )
          environment = default_environment()
          environment["extra"] = "mcp"
          environment["python_version"] = "3.9"
          assert requirement.marker is not None
          assert not requirement.marker.evaluate(environment)
          environment["python_version"] = "3.10"
          assert requirement.marker.evaluate(environment)
      - name: Test
        run: python -m pytest -q
      - name: CLI smoke
        run: |
          memdsl --version
          memdsl lint examples/mira
          memdsl eval compliance examples/compliance --cases examples/compliance/cases.jsonl
      - name: Build and inspect wheel
        run: |
          python -m build
          python -m pip install --force-reinstall dist/*.whl
          python -c "import memdsl; assert memdsl.__version__ == '0.6.0'; assert memdsl.EVIDENCE_PACK_SCHEMA == 'memdsl.evidence_pack.v1'; assert memdsl.POLICY_VERSION == 'memdsl.policy.v1'"
          python -m twine check dist/*

  mcp:
    name: mcp / ${{ matrix.os }} / Python 3.12
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install MCP extra
        run: python -m pip install -U pip && python -m pip install -e ".[dev,mcp]"
      - name: Full tests
        run: python -m pytest -q
      - name: MCP smoke
        run: memdsl-mcp --inspect -w examples/alex
